front:
  text: 上清太上開天龍蹻經卷之一達六
  hash: sha256:0d4742820c56df27d65032bb2f3f66615243157b3078570e8c6e60bf92545afd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0163_HFL_001-001a, image: hfl/1037/1037-048.png}
body:
  text: 黃帝請問甯君訣第一軒轅黄帝夙植仙津上感神精誕靈特秀位承天帝復道求真清齋玄闕越雲臺山拜參甯君請問三洞曰朕承洪緒雖統萬機每請真要奉修玄㫖心形奔躁聖道幽微奥理虚凝未能玄悟洞玄靈寳五篇通生洞神仙經普垂色像大洞聖教義貫虚无託質通虛三寳齊禀凡情惑滯至道難明三洞通生通同一不甯君答曰玄元始氣三洞玄根三清三界普垂應體仙真聖位九品玄階三洞混通應感有異歷劫應化三寳齊臨高聖下凡隨機降授上聖傳道應説離言中真傳德寄言通理下界傳經因言修習開度有賢三等斯别黄帝再拜跪請啓白敢問其道三品互差願示其要令无疑惑甯君吿曰三境三界通礙見殊高聖下凡悟有深淺洞通无礙名爲三洞三洞通方感報不等言上聖傳道者至道玉帝於龍漢劫時應爲天寳大洞聖君上生玉清十二聖天當傳聖道而與鬱單天帝九天丈人禪善天帝九天真皇須延天帝元始天王各教三天九品聖道赤明劫時應爲洞玄靈寳真君次生上清十二真天傳於真道而與寂然天帝元始先生不驕樂天帝高上元皇應聲天帝虚皇玉帝各教三天九品眞道上皇劫時應爲神寳洞神仙君次生太清十二仙天傳於仙道而與梵輔天帝萬始先生清明天帝紫虚帝君无愛天帝太真五皇各教三天九品仙道此是上聖而傳其道也言中真傳德者太易時傳授太帝君太始時傳授天帝君靈陽子太初時傳授太微帝君太極時傳授太微天帝君太素時傳授金闕後聖太平李真君上相素童君上相青童君九玄帝君此是中真而傳其德也言下界傳經者應化法門十二等事一者本文三洞宣説二者神符奉宣吿信三者玉訣示无疑難四者靈圖圖寫相好五者譜録歷代授道六者戒律防非禁惡七者威儀庠序軌格八者方法修行節度九者術數隱景貴形十者記傳傳示學人十一者讚頌歌誦聖德十二者章表章請表奏三洞通達應感證緣三乘積功證果亦别隨功高下上生諸天諸天果報乘經説證三十六部證品生天三十六天隨經修品上證道果因有發修解脫有縁自然正性也黄帝再拜又重啓曰三十六部三品應縁三十六天隨經修品經證天品依經生天三品感經凡情暗弱未曉道源證品通不甯君告曰三洞經法天尊相門應感通生皆從相立身光洞耀朗徹太空境界天人咸皆禀植三寳應象九帝翼形妙有通滋始成神識神清智朗志鑒慧明氣濁神昏暗彰斯起體洽大道境界通玄靜念身神三清洞合八景保舉奠策雲軿九天翼形潜昇淨境三十六部洞瑩爾身三十六天念隨心克諦聽吾言方爲汝說甯君吿黄帝曰至道无象无形无名從本降跡漸顯三身從起三身而演三洞三境三界凡聖顯差九天九人感象通貫三寳漸頓三乘接生皆起法身身光相好三身相好境界垂形應感天人同滋嚮象皆從相好而植其神上禀玄精始成妙用第一法體玄徹幽微真一妙智清淨无礙上顯法體三十六門應演三洞三十六相上下相合七十二相第二應身應體顯象三境三界上下圓明降氣生神而成靈識无量功德福備人天應感業緣隨功證宅上顯三境三十六天下應三界三十六帝上下通應七十二相第三化體開化人神皆含三洞九氣生育倣天象地合爲識靈内顯化身三十六相外示生人三十六相内外相合七十二相三十六部是无相源從理寄言令銓其理應生境界福備十方歸根返本以立階品證果進位超昇大羅體解大道入真實際圓滿清淨澤被黎民善開方便示有爲法通生妙用而起識神萬化應縁一相空靖也甯君吿黄帝曰窈寂法身而生空洞空洞之内而生太源太源之化三氣生焉上氣曰始中氣曰元下氣曰玄玄氣所生出乎元元氣所生岀於始此氣之本宗於象帝之先故曰玄元始氣也玄元始氣三境玄根上應三境而立三尊中生三界三乘接引通爲三元生人三官故此三氣品施生焉三生萬有根源本始也甯君告黄帝曰三清天中玄元始氣以三合五化爲八景神各生八方而爲二十四帝者上爲三清二十四宫紫虛仙府降爲四梵四八化生各爲三界二十四宫普爲一天二十四氣内生人身二十四體故此三元三部八景二十四帝帝各三元元各五神合爲三百六十神六六品族合氣生神上爲三清六十四梵氣二六相合三十有二降生三界三十二天普通一天三十二帝二十八宿璇璣玉衡故生一天三百六十日一月三百六十時一地三百六十名山一人身中三百六十骨也甯君告黄帝曰玄元始氣合生九氣故爲九帝上爲九天中生九天下爲九地諸天九聖皆備形神生人九户禀道生立又生比地九野分方上通五帝四運周緒九氣列正隂陽五行人民品物並受成生也甯君告黄帝曰三清九天各生八方而爲七十二宫三元各有二十四帝上爲二十四真中爲二十四神下爲二十四生三元八景品族生神合中九宫八十有一通生諸天八十一分普生諸地八十一域内生人身八十一關節也甯君吿黄帝曰正一大道以出眞帝正一玄真而生大神三元解變則一之所生故玄功歸一萬事生焉此至道之祖宗元氣之根始也從本降跡普植形神因无名立有名寄有名詮无名通爲境界應氣生神三洞通化以爲天尊三公天也九天通化應爲天尊九卿天也仙真聖位各證九品故有三九二十七位故爲天尊二十七大夫天也九天初構上下重疊及其分應則列八方故有九九八十一位故爲天尊八十一元士天也通前三公九卿二十七大夫八十一元士各生氣象故爲天尊百二十郡天也又於百二十郡等天内爲五曹外爲五官各生十神合爲天尊千二百縣官天也又於千二百縣中各有三元元各五郷故爲天尊萬八千郷天也又於萬八千郷天各禀五氣以爲五天亭故爲天尊三萬六千亭天也又於三萬六千亭中亭各五候合爲天尊十八萬候故此官屬通生諸天又備人神各禀氣象並得安立而植生根紫户玉閣三萬六千關節根源本始一時生神也甯君告黄帝曰吾昔承玉帝開天上經三洞法門萬化根始降生境界而植形神應感衆靈普禀官屬三清上境三洞玄根下生三界二景通合四緒御運五氣遞興百六數交劫有生滅諸天壽限高下不同隨功證報見有差别故演三洞道君奉宣當度有賢歷劫開受汝今請問向序應生諦聽吾言示汝寳訣元始開化通貫天人身生相好境界通禀虛无應體寄象立言因有發修方登空寂三洞接引九品降差妙極道源㝠通玄一體解幽曠識朗慧微三清妙門俯念斯感甯君告黄帝曰吾昔承大帝昔徃初劫龍漢開圖内溟混沌十號化身託迹諸天成立諸法離言說道无礙生津天中之尊无形化生於大羅天明霞觀中而演三洞三十六部降生三境三十六天三洞法門萬行根始下生三界品物流形八方已下各生五億五萬五千五百五十五億等无極三界比地等天八方皆有三千大千世界无極三界皆禀三清三元上下三十六天每天四方四九列位上應天璣三十六門普爲比地三十六音一塵之内三十六氣天人相感同禀道生三十六地嚮象通感三洞通化凡聖有殊應感隨機復有九種上下聖教上通玉清中上真教次通上清下上仙教次通泰清上中聖教次通无色中中真教次通色天下中仙教次通慾界上下聖教下接利根中下真教下接平根下下仙教下接鈍根三乘漸頓三根不同三界天人三寳接引三清聖教三洞玄階上帝道郷曠理虛漠通生妙有諸天良梯道性虛凝不生不滅无來无去顯衆妙門恍惚隨迎示真實法諸天受樂從有發修因緣行業根本果始證果超拔從此六門慈悲善忍四等俱備雌柔懃信諫諍止息耽行有德心捨无德念念增廣福德慧隆天眼了達察无相想想既已去色形又无捨識增修无有勞動既无動作輕塵都忘超世生滅至四人境壽福浩劫无礙化身託下救凡積功昇進昇玄證果又登四梵漸昇太清登入九仙次昇上清登入九真次昇玉清昇入九聖上至上聖上上聖果功德充滿昇道入无忘功忘果自然正性與道混合冥會虛空天尊通身常住湛寂甯君告曰三洞開化普植天人一切官屬咸皆禀受有物生主无形常存境界應身皆爲天帝普爲上下三十六天尊又於比地三十六音主諸天世界通含三十六帝形下地上方通管三十六音氣三十六部普度无崖三十六天昇進階品三清聖衆妙寂常常三界九地四運遄速三界劫壞混沌无生三清三寳更降元氣每劫重造三氣爲宗三寳通生九運不等故无色界上元頂天其天氣相交三千三百度爲小陽九小百六其天氣相交六千六百度爲中陽九中百六其天氣相交九千九百度爲大陽九大百六色慾下界與上互差下短上長歲月有異其上无色天氣相交三千三百度次下色界中元頂天即有六千六百度又下慾界下元頂天加有九千九百度其上无色小陽九其中色界中陽九其下慾界大陽九其下慾界萬劫齊粉其中色界百迴劫壞其上无色一迴普没又於慾界九土亦異天地相交三千三百度三土受衰水火兵病饑饉餓死六千六百度六土受害九千九百度九土並損故顯太一布氣流行太歲宫氣更相之適遍被家國内及人身所至之宫隨神見疾三期逆順交錯八方三十六載十二周滿此是小會積數成灾轉讀是經方免斯患大小劫會九氣終時業果不定上下報異上清太上開天龍蹻經卷之一
