front:
  text: 上清太上開天龍蹻經卷之一達六
  hash: sha256:0d4742820c56df27d65032bb2f3f66615243157b3078570e8c6e60bf92545afd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0163_HFL_001-001a, image: hfl/1037/1037-048.png}
body:
  text: 黃帝請問寧君訣第一軒轅黃帝夙植仙津上感神精誕靈特秀位承天帝復道求真清齋玄闕越雲臺山拜參寧君請問三洞曰朕承洪緒雖統萬機每請真要奉修玄旨心形奔躁聖道幽微奧理虛凝未能玄悟洞玄靈寶五篇通生洞神仙經普垂色像大洞聖教義貫虛無託質通虛三寶齊稟凡情惑滯至道難明三洞通生通同一不寧君答曰玄元始氣三洞玄根三清三界普垂應體仙真聖位九品玄階三洞混通應感有異歷劫應化三寶齊臨高聖下凡隨機降授上聖傳道應説離言中真傳德寄言通理下界傳經因言修習開度有賢三等斯别黃帝再拜跪請啓白敢問其道三品互差願示其要令無疑惑寧君告曰三境三界通礙見殊高聖下凡悟有深淺洞通無礙名為三洞三洞通方感報不等言上聖傳道者至道玉帝於龍漢劫時應為天寶大洞聖君上生玉清十二聖天當傳聖道而與鬱單天帝九天丈人禪善天帝九天真皇須延天帝元始天王各教三天九品聖道赤明劫時應為洞玄靈寶真君次生上清十二真天傳於真道而與寂然天帝元始先生不驕樂天帝高上元皇應聲天帝虛皇玉帝各教三天九品真道上皇劫時應為神寶洞神仙君次生太清十二仙天傳於仙道而與梵輔天帝萬始先生清明天帝紫虛帝君無愛天帝太真五皇各教三天九品仙道此是上聖而傳其道也言中真傳德者太易時傳授太帝君太始時傳授天帝君靈陽子太初時傳授太微帝君太極時傳授太微天帝君太素時傳授金闕後聖太平李真君上相素童君上相青童君九玄帝君此是中真而傳其德也言下界傳經者應化法門十二等事一者本文三洞宣説二者神符奉宣告信三者玉訣示無疑難四者靈圖圖寫相好五者譜録歷代授道六者戒律防非禁惡七者威儀庠序軌格八者方法修行節度九者術數隱景貴形十者記傳傳示學人十一者讚頌歌誦聖德十二者章表章請表奏三洞通達應感證緣三乘積功證果亦别隨功高下上生諸天諸天果報乘經説證三十六部證品生天三十六天隨經修品上證道果因有發修解脫有緣自然正性也黃帝再拜又重啓曰三十六部三品應緣三十六天隨經修品經證天品依經生天三品感經凡情暗弱未曉道源證品通不寧君告曰三洞經法天尊相門應感通生皆從相立身光洞耀朗徹太空境界天人咸皆稟植三寶應象九帝翼形妙有通滋始成神識神清智朗志鑒慧明氣濁神昏暗彰斯起體洽大道境界通玄靜念身神三清洞合八景保舉奠策雲軿九天翼形潛升淨境三十六部洞瑩爾身三十六天念隨心克諦聽吾言方為汝説寧君告黃帝曰至道無象無形無名從本降迹漸顯三身從起三身而演三洞三境三界凡聖顯差九天九人感象通貫三寶漸頓三乘接生皆起法身身光相好三身相好境界垂形應感天人同滋嚮象皆從相好而植其神上稟玄精始成妙用第一法體玄徹幽微真一妙智清淨無礙上顯法體三十六門應演三洞三十六相上下相合七十二相第二應身應體顯象三境三界上下圓明降氣生神而成靈識無量功德福備人天應感業緣隨功證宅上顯三境三十六天下應三界三十六帝上下通應七十二相第三化體開化人神皆含三洞九氣生育倣天象地合為識靈內顯化身三十六相外示生人三十六相內外相合七十二相三十六部是無相源從理寄言令銓其理應生境界福備十方歸根返本以立階品證果進位超升大羅體解大道入真實際圓滿清淨澤被黎民善開方便示有為法通生妙用而起識神萬化應緣一相空靖也寧君告黃帝曰窈寂法身而生空洞空洞之內而生太源太源之化三氣生焉上氣曰始中氣曰元下氣曰玄玄氣所生出乎元元氣所生出於始此氣之本宗於象帝之先故曰玄元始氣也玄元始氣三境玄根上應三境而立三尊中生三界三乘接引通為三元生人三官故此三氣品施生焉三生萬有根源本始也寧君告黃帝曰三清天中玄元始氣以三合五化為八景神各生八方而為二十四帝者上為三清二十四宫紫虛仙府降為四梵四八化生各為三界二十四宫普為一天二十四氣內生人身二十四體故此三元三部八景二十四帝帝各三元元各五神合為三百六十神六六品族合氣生神上為三清六十四梵氣二六相合三十有二降生三界三十二天普通一天三十二帝二十八宿璇璣玉衡故生一天三百六十日一月三百六十時一地三百六十名山一人身中三百六十骨也寧君告黃帝曰玄元始氣合生九氣故為九帝上為九天中生九天下為九地諸天九聖皆備形神生人九户稟道生立又生比地九野分方上通五帝四運周緒九氣列正隂陽五行人民品物並受成生也寧君告黃帝曰三清九天各生八方而為七十二宫三元各有二十四帝上為二十四真中為二十四神下為二十四生三元八景品族生神合中九宫八十有一通生諸天八十一分普生諸地八十一域內生人身八十一關節也寧君告黃帝曰正一大道以出真帝正一玄真而生大神三元解變則一之所生故玄功歸一萬事生焉此至道之祖宗元氣之根始也從本降迹普植形神因無名立有名寄有名詮無名通為境界應氣生神三洞通化以為天尊三公天也九天通化應為天尊九卿天也仙真聖位各證九品故有三九二十七位故為天尊二十七大夫天也九天初構上下重疊及其分應則列八方故有九九八十一位故為天尊八十一元士天也通前三公九卿二十七大夫八十一元士各生氣象故為天尊百二十郡天也又於百二十郡等天內為五曹外為五官各生十神合為天尊千二百縣官天也又於千二百縣中各有三元元各五鄉故為天尊萬八千鄉天也又於萬八千鄉天各稟五氣以為五天亭故為天尊三萬六千亭天也又於三萬六千亭中亭各五候合為天尊十八萬候故此官屬通生諸天又備人神各稟氣象並得安立而植生根紫户玉閣三萬六千關節根源本始一時生神也寧君告黃帝曰吾昔承玉帝開天上經三洞法門萬化根始降生境界而植形神應感衆靈普稟官屬三清上境三洞玄根下生三界二景通合四緒御運五氣遞興百六數交劫有生滅諸天壽限高下不同隨功證報見有差别故演三洞道君奉宣當度有賢歷劫開受汝今請問向序應生諦聽吾言示汝寶訣元始開化通貫天人身生相好境界通稟虛無應體寄象立言因有發修方登空寂三洞接引九品降差妙極道源冥通玄一體解幽曠識朗慧微三清妙門俯念斯感寧君告黃帝曰吾昔承大帝昔往初劫龍漢開圖內溟混沌十號化身託迹諸天成立諸法離言説道無礙生津天中之尊無形化生於大羅天明霞觀中而演三洞三十六部降生三境三十六天三洞法門萬行根始下生三界品物流形八方已下各生五億五萬五千五百五十五億等無極三界比地等天八方皆有三千大千世界無極三界皆稟三清三元上下三十六天每天四方四九列位上應天璣三十六門普為比地三十六音一塵之內三十六氣天人相感同稟道生三十六地嚮象通感三洞通化凡聖有殊應感隨機復有九種上下聖教上通玉清中上真教次通上清下上仙教次通泰清上中聖教次通無色中中真教次通色天下中仙教次通欲界上下聖教下接利根中下真教下接平根下下仙教下接鈍根三乘漸頓三根不同三界天人三寶接引三清聖教三洞玄階上帝道鄉曠理虛漠通生妙有諸天良梯道性虛凝不生不滅無來無去顯衆妙門恍惚隨迎示真實法諸天受樂從有發修因緣行業根本果始證果超拔從此六門慈悲善忍四等俱備雌柔勤信諫諍止息耽行有德心捨無德念念增廣福德慧隆天眼了達察無相想想既已去色形又無捨識增修無有勞動既無動作輕塵都忘超世生滅至四人境壽福浩劫無礙化身託下救凡積功升進升玄證果又登四梵漸升太清登入九仙次升上清登入九真次升玉清升入九聖上至上聖上上聖果功德充滿升道入無忘功忘果自然正性與道混合冥會虛空天尊通身常住湛寂寧君告曰三洞開化普植天人一切官屬咸皆稟受有物生主無形常存境界應身皆為天帝普為上下三十六天尊又於比地三十六音主諸天世界通含三十六帝形下地上方通管三十六音氣三十六部普度無崖三十六天升進階品三清聖衆妙寂常常三界九地四運遄速三界劫壞混沌無生三清三寶更降元氣每劫重造三氣為宗三寶通生九運不等故無色界上元頂天其天氣相交三千三百度為小陽九小百六其天氣相交六千六百度為中陽九中百六其天氣相交九千九百度為大陽九大百六色欲下界與上互差下短上長歲月有異其上無色天氣相交三千三百度次下色界中元頂天即有六千六百度又下欲界下元頂天加有九千九百度其上無色小陽九其中色界中陽九其下欲界大陽九其下欲界萬劫齊粉其中色界百回劫壞其上無色一回普沒又於欲界九土亦異天地相交三千三百度三土受衰水火兵病飢饉餓死六千六百度六土受害九千九百度九土並損故顯太一布氣流行太歲宫氣更相之適遍被家國內及人身所至之宫隨神見疾三期逆順交錯八方三十六載十二周滿此是小會積數成災轉讀是經方免斯患大小劫會九氣終時業果不定上下報異上清太上開天龍蹻經卷之一
