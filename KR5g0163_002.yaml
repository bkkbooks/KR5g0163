front:
  text: 上清太上開天龍蹻經卷之二達七
  hash: sha256:ad04731df2e8a1f719d17e62098040e23408c1f882a9877fcb027e409900e0c1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0163_HFL_002-001a, image: hfl/1037/1037-068.png}
body:
  text: 三洞通生元置品第二是時黃帝拜參寧君請問三洞尊經三品傳道啓問說已又拜稽首復請訣曰三洞尊經上生三境三十六天三十六部既生境界各有三十六天三十六天亦是三十六部以不寧君答曰玄元始氣三境玄根三十六部生天法宅三洞降德為天人之生主九聖通化為象帝之玄根三十六部為境界之生門三十六天為入道之階品故因經以開導明氣象以通於經開徑路以證道鄉藉證修而登聖果淨身神以通道境修盟約以祛惑情三十六部洞觀齊臨三十六天隨心嚮應三清上境下界應緣三界升墜劬在心首階品不等故立界名隨根應感凡有五種諦聽吾言方為汝說寧君告黃帝曰吾昔承道主生化法王天中之尊皆悉禀受初降妙一聖化初始始生於元元通真道元生於玄玄主仙教仙真聖位三洞玄尊三寶立位三號亦别故於龍漢初時元始開圖應為玉清天寶聖君號為大洞無形天尊而說大洞十二部經而教玉清十二聖天次於赤明劫時應為上清靈寶真君號為洞玄無名天尊而說洞玄十二部經而教上清十二真天次於上皇劫時應為泰清神寶仙君號曰洞神元始天尊而說洞神十二部經而教泰清十二仙天三十六部經生於諸天天人禀受故名三界三乘漸頓接引通方開度有賢應身降受歷代教化天尊通神三洞寶經隨方顯用寧君告黃帝曰元始應身七十二相上生三境下生三界皆禀三洞品物流形生天元始故稱天尊三十六部天尊化體三界之內三寶接生應感不同故為無色色欲界也又為衆生根性參差雖同一天咸有五種一者三洞三界二者應化三界三者反出三界四者流來三界五者輪回三界言三洞三界者三十六部上生三境三十六天中生三界三十六帝下生九壘三十六土皇天人相通三乘接引精氣相貫皆禀三洞善貸得生也其二應化三界者三部八景應為隂陽四時變化見有生老其三反出三界者至道妙氣灌養生神雖居耽著不為所染起羣絶俗離有為門反此囂塵獨超上道也其四流來三界者從道妙本寄備隂陽形染六情見起通執善善相繼惡惡相續流轉見報入善惡門也其五輪回三界者耽染見著而墜三塗流輪惡道不能得出永沈苦海長淪愛欲也寧君告黃帝曰元始應演三洞尊經通成境界接引階品無有為有開化天人令登無相以入空解上顯三境三洞通方下生三界應感三種一者豁爾虛空二者質礙形色三者緣慮心體言一者豁爾虛空者空洞道氣混化太虛應象立無而成境界山河石壁嶮岨幽深端正好醜以為耽滯天人六道感有見無故云一者豁爾虛空也言質礙形色者應化三界三十二天生處隂陽而成有體從道妙一善貸生津寄託胞胎世間父母兩半相合而執有形具足諸根是為色聚既根成就生六種識而起分别是為識聚既妄聚塵分别假相而生戀著是為想聚倒想聚已妄生憎愛而起貪嗔是為行聚既覩聚合妄想堅成執見愚癡而生惡行淪沒三塗不能得出是故名為質礙形色言緣慮心體者即體是報由業緣生善智慧者返道復源愚癡濁辱流浪惡道隨其所報應感見生六欲四心為以界畔是故名為緣慮心體也是故為說三界感差受報各異而有五種一者未入三界繫縛之位雖生其域非三界因出於生滅上生四人天也二者感生無色業上出色欲猶四輕塵捨識增修妄形神淨也三者感生色界之業為色深重漸捨六塵三度重捨十八天報四者感生欲界之業六欲耽染故感六天五者感生三惡道業為耽六欲三毒見生而落畜生餓鬼地獄道也通生官屬元置品第三寧君告黃帝曰元始天尊昔於大羅明霞觀中應生境界而演三洞三十六部大洞上品十二部經具有三洞三十六部尊經之福何以故大洞聖教通真生仙兼包衆經一切官屬故有洞玄洞神三十六部上品功德洞玄部中不及兼上唯通於下而攝洞神故有二十四部真仙之力洞神仙經不及於上唯有洞神十二部經生仙之福三洞應化通起生源三寶接引粗妙有别從道妙氣降跡生神無有為有有元所有體解大道發無上心解脫無為常樂我淨也洞玄真教中乘應緣從聖降真通玄入妙故說應化開方便門知有不有從有發修無愛染心離有為境修習正觀安住中道洞神仙教寄備因緣故立境界諸天官屬開化人神成立諸法三寶通化仙為生門從生發修入無相體故顯應化仙陽生首從生遷仙遷仙入真遷真入聖遷聖入道三洞妙有以氣為宗宗生於始始生於元無生於玄始氣通聖上生玉清元氣主真中生上清玄主仙教下生泰清三清應象三寶通臨三十六部應天教授三十六天三洞生根三界禀氣應界修品七十二相境界垂形八十一好表生大有故於龍漢劫時號為無形天尊應為玉清天寶聖君以為大洞之尊玉帝而生九萬九千九百九十億萬氣一氣各生九萬九千九百九十億萬里一氣各生九萬九千九百九十億萬歲歲里數終曆分相合下通三界以為大劫也次於赤明劫時號為無名天尊應為上清靈寶真君為洞玄之尊君而生九萬九千九百九十九萬氣一氣各生九萬九千九百九十里一氣各生九萬九千九百九十萬歲歲里數終曆分相合下通三界以為中劫次於上皇劫時號為元始天尊為洞神之尊神而生九萬九千九九百九十萬氣一氣各生九萬九千九百九十萬里一氣各生九萬九千九百九十萬歲歲里數終曆分相合下通三界以為小劫天尊言吾今應相境界通身上顯諸天下應萬象歷劫應化開度兆人有道上賢降為師授或生下界與物混冥託質通凡沈浮莫辨與道通化應接有緣為受是經令開慧解潜行救度不恃有恩志淨神清為宣是法寧君重告黃帝曰三清九帝八景通方應生三境通為接引下降三界品物成形開心天人同禀官屬故玄元始氣各生八景而為二十四帝九天各生八景而為七十二官言二十四帝化為二十四神二十四神化為二十四氣氣亦成神神亦成氣散之為雲霧合之為形影出之為造化入之為真一上結三元言結萬物神真變化元有定名百神之中皆以三合成德天地之極上境二十四帝下為三界二十四氣二十四帝帝各三元元各五神合生三百六十神混通三界三百六十神各生一天三百六十宫各生一歲三百六十日又生一月三百六十時各生人身三百六十骨普生一地三百六十名山下通天氣八景齊臨上灌生津合氣同植無極三界普禀此原天人相通萬境通貫八景開化應象立原二十四帝上生三百六十神六位而成合為六十四梵氣六位相合三十有二三十二歲天一周也故明三界三十二天三清九氣上下通神傍貫璇璣四運明朗三洞天曆歲為三元六位陽辰為六齊月八景通運八節修門十直朝尊奉修十善燒香願念功感諸天然燈續明拔生救死香花寶蓋供養諸天轉讀尊經令通慧解上懺七祖先代宿殃下為含靈同滋法澤三清衆聖俯鑒丹誠三界宫屬同垂監映三宫清淨九户圓明五藏曉徹六府通慧八十一好光生八十一關機三十二相通明三百六十骨三十二帝表現玄虛三十六天顯登頂相八景備衛九天翼形駕景策龍上登玉清也寧君告黃帝曰大道生化無物不通大包無外細入無間無物不禀無物不生無物不度無物不成開廓太空分為十等從上大羅下及三清而為七分上及傍普皆備太空以為道境故玄都玉京山上而有七覺之氣也大羅已下而生三境合為七分傍備太空通為聖境復次三清八方正中各於其下又為一分而生比地五億億五萬億五千億五百億五十億五五億等無極三界皆感五氣五運生成故通天地五十五數三元上下皆以三洞合通九帝一十二天總合三元三十六帝正中八方普稟三清唯感四序三十二天三百六十度以成二十八宿五運生化雖感道原分應通凡從上第八分也復次各於無極三界已下又為一分以為九壘三十六土皇皆禀三界上通三清每年八節四季之日録人善惡上奏三清善惡罪福上下計會此通從上第九分也復次九壘之下而有八門九幽地獄上是陽考下主隂罰上下各九亦名十八大地獄也於此獄下大風澤之氣似風非風似水非水識苦性昏不可分别擎持地輪全不傾倒此是從上第十分也寧君告黃帝曰三洞通化九氣混生天有三十六曹君地有三十六司府三境下降九氣通生九壘上騰三界通感一天境域二景合明三光齊臨四緒咸備璇璣混合總統彌羅廣覆生神應氣成熟周天曆紀運度玄關九壘土神各為比地太歲太隂大將軍歲德建破之神若有行人奉修三洞三清上經當勉下地九土靈祇不為作害故第一之地名元德其氣上青中黃是元土卿所治厚一萬一千一百一十里土象百官悉治其中第二之地皇德其氣通黑是元庭土丞所治土家百官亦治其中第三之地帝德其氣通蒼是虎口土龍所治土家百官亦治其中第四之地王德其氣通黃是元心土大將軍所治第五之地人德其氣通赤是元福土令所治第六之地地德其氣通白是元骨土長所治第七之地里德其氣通紫是始甲六父母所治第八之地復德其氣通青是始賢土宗正所治第九之地昌德其氣通緑是軒始土下有二千石所治九地土官各管土府上通比地十二神官也上清太上開天龍蹻經卷之二
