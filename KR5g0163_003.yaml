front:
  text: 上清太上開天龍蹻經卷之三達八
  hash: sha256:3053aab3c0b1d143a97b42aaf1f11360013fd27a4670fabb96a167b8c8ed533f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0163_HFL_003-001a, image: hfl/1037/1037-088.png}
body:
  text: 至道法身應生相好元置品第四是時黃帝越雲臺山參拜寧君請問三洞三等開度應接天人次問三寶通生境界又問境界通生天人人通道生生通道體道通無外普備形神至道無私感化何異寧君告黃帝曰三洞九帝九天生門仙真聖位各有九品二十七位三洞品階從凡遷仙八十一等本為三界迷暗參差故立三乘以為階品至道玉帝功備十方故立三寶三尊不同應顯三身三體各異故於龍漢劫時應以聖教號為無形天尊赤明劫時應以真教號為無明天尊上皇劫時應以仙教號為元始天尊三寶應教三乘有差應化法身本迹亦别昔於初劫龍漢開圖於大羅天明霞觀中而演三洞三十六部應生境界各有三十六天內演十號混沌天元玄元始氣應為玄象明光洞煥九色重暉八景圓明而生相好應生境界化體成人人天果報凡聖不等三身相好上中下殊開立人神皆稟化體也寧君告黃帝曰吾昔於初劫至道玉帝無形天尊於大羅天明霞觀中闡三洞應生十號敷九帝而立九天仙真聖位為三寶之玄津二十七位為境界之修品三十六部上為三境之玄根下為三界三十六天之感宅七十二相境界垂形八十一好人天生本消息變化遍備大千吐納應身通生五億無極三界傍亘無涯境界通神上下俱稟每劫應現名號有殊歷代化身尊名有别第一號源源是源本第二號混混不可分别第三號沌沌是朴大第四號溟溟是溟然第五號涬涬然無際第六號濛濛如細霧第七號澒澒如澒涌第八號始始氣凝於大羅第九號元元善之長第十號玄玄主上天玄之又玄天中尊主位稱陛下上備生原是故無名天尊上從大羅八號始氣初生玉清應以聖教大洞法門次從玉清九號元氣下生上清應以真教洞玄法門次從上清十號玄氣下生泰清應以仙教洞神法門復次三境下生三界境界相感三乘互差三境接引三界亦别玉清聖境下通無色上清真境下通色界泰清仙境下通欲界復次三洞通生人神天人相通九户齊育玉清聖境生人上一泥丸上宫上清真境生人中一真為絳宫泰清仙境生人下一黃庭仙宫故人下一黃庭元王以為生神含氣命主仙道主生因生修習仙之言遷遷升太清遷仙入真上升上清遷真入聖上升玉清遷聖入道上升大羅至道之境曠理凝漠也元始應演三洞三十六相元置品第五是時黃帝拜受寧君為演天尊開化事已復更啓問生天元由玄元始氣三境玄根降生三界萬象通備天尊十號三洞生由三境三界普稟斯感元始降化應相成天天既有生相門何在寧君告黃帝曰吾昔承天尊於大羅天初生境界開化形神故立天帝建設生津為諸大聖而演太上開天上經七十二相三種應身八十一好三度化體從本降迹漸顯有為故顯法身復次應身更示化身通生境界同稟相身一切天人皆感生用始成靈爽而有識神也玄元始氣三洞本原三十六部境界階品玉京玄臺三洞應成紫微金闕九氣通立故示法體以顯天容應化通凡人天證宅三洞妙本通立身光境界垂形應緣斯起妙辨無礙是曰聖真高上莫過是為相體故顯九變九一化形四九通方三十六等三十六相三度應身解脫囂塵是真實際妙而無礙應為至一光明無上應為皇一百神聖宗應為帝一純粹湛然應為真一萬善之長應為元一司隂真宰應為天一虛通無礙應為玄一長生大主應為太一盟威法王應為正一於此九一內顯虛用寂曠元闕故顯為希緬平無礙而示於夷妙辨無方應之為微大包無外普備為空同物受納通容為洞豁然不滯應為妙無於此妙無漸顯應教而示意神次立志神復次念神三念發迹應教起用故從正智而生實智復次實智而生權智於此權智而顯三寶精神氣也言精者以靈智為主神者不測以變化為功氣者氣象以生成為用功用既異故謂為三體不可分故名三一於此三一又示三體一者以色心為體二者以三洞為體三者以妙德為體言色心為體者寂地本身以真一妙智為體言三洞為體者修進階次應品立元證果升位廣度一切為大智慧原色是纍礙升進階法九聖以還皆求進品既滯欲纍並言有色真道纍盡惟有妙心上證道果具一切德寂不可見名為妙無動時隨迎同物有體心色雖妙物得見之故名妙有以位感報伏結升玄進登上聖至上聖果忘因忘果自然正性同於大道與物混溟高上莫過始稱天尊故於天尊漸顯應身而生境界玄元始氣遍備身光三氣化形而演三洞始為青光上生於天元為白光中生於人玄為黃光下生於地元始天尊於此三色合生九光遍起法身光明洞耀始生於混混為蒼光混生於洞洞為赤光洞生於浩浩為青光元生於昊昊為緑光昊生於景景為黃光景生於遁遁為白光玄生於融融為紫光融生於炎炎為碧光炎生於演演為為光九色光耀瑩徹法身於此九光通生於界上生三境三十六天以示天容虛無洞曉下生三界三十六帝權應化身善貸生門漸頓引育故名三洞三十六相也天尊法身應生三界三十六相元置品第六寧君告黃帝曰吾昔承天尊於大羅天而演太上開天元置品經應身生相境界垂形上為三清三十六天尊下生三界三十六天帝故顯凡聖應顯通方七十二相人天報異三清上境妙寂常常九品玄階忘功證報三界之內為有見生妄想堅成而執耽著故設應感三十二天寄備隂陽通生攝受玄元始氣八景圓明上為四梵三界頂天尊曆運開生下為三界上下相重三十二天帝總御四八大象交周九氣相參而成運度三十二帝傍貫璇璣皆為一天二十八宿也九天重壘亦為八方比地九宫四天王天上下相重亦為四方四八生主皆稟九氣兩半相和本迹合通三十六位故為上下相重三十六帝也天降一氣則五氣生焉寄備隂陽合氣成體故陽有少陽太陽隂有少隂太隂故陽中之隂為木陽中之陽為火隂中之陽為金隂中之隂為水和中之和為土少陽之氣各為一天皆為東方九氣青天而生東方太皇黃曾天太明玉完天清明何童天玄胎平育天元明文舉天上明七曜摩夷天虛無越衡天太極濛翳天總屬東方九氣青天上為一天各為七宿角亢氐房心尾箕度上屬一天皆為陽明主天三魂也太陽之氣各為南方三氣丹天而生赤明和陽天玄明恭華天曜明宗飄天竺落皇笳天虛明堂曜天觀明端靖天玄明恭慶天太煥極瑶天總屬南方三氣丹天上為一天各為七宿井鬼柳星張冀軫度上屬丹元主生天氣也少隂之氣各為一天皆為西方七氣素天而生元載孔升天太安皇崖天顯定極風天始黃孝芒天太黃翁重浮容天無思江由天上揲阮樂天無極曇誓天總屬西方七氣素天上為一天皆為七宿奎婁胄昴畢觜參度上屬隂精生天七魄也太隂之氣各為一天皆為北方五氣玄天而生皓庭霄度天淵通元洞天太文翰寵妙成天太素秀樂禁上天太虛無上常融天太釋玉隆騰勝天龍變梵度天太極平育賈奕天總屬北方五氣玄天上為一天皆為七宿斗牛女虛危室璧度上屬北極生天玄津也無極三界同稟此門上下傍並通方感用故示應經三十六相也九色寶光各生八景八十一好元置品第七寧君告黃帝曰吾昔承天尊於大羅天而演太上開天元置品經託身立相萬象法門內寂法身應為化體身光洞耀表現玄虛應相生天而成相好相者是本從寂宣言好者是迹因言明理因言宣理開度有緣從理寄言接引階品故顯身相洞貫諸天相中生好更示生體九光洞徹上下通暉境界圓明普無隔礙九天重壘各生八方內含九天本迹雙應八十一好通備形神三十六部證緣無滯九一通化妙辨無方九色寶光始一為主玄元始氣合生九門三號各三故為九一至一始聖混為蒼光皇一始聖洞為赤光帝一始聖浩為青光元一元無昊為緑光真一元真景為黃光天一元真遁為白光玄一玄仙融為紫光太一玄仙炎為碧光正一玄仙演為為光九天合德普植形神八景圓明境界通立九天妙一上下重暉亦為比地而生好體上上第一鬱單聖天亦為一天比地一宫九氣生門始一天主皆為鬱單之野清淨世界其次第二禪善聖天亦為一天比地二宫延福鄉天仁靜世界其次第三須延聖天亦為一天比地三宫大堂鄉天納善世界其次第四兜術真天亦為一天比地四宫無福田天用賢世界其次第五不驕樂真天亦為一天比地五宫大福堂天中方世界其次第六應聲真天亦為一天比地六宫福德鄉天延賢世界其次第七梵輔仙天亦為一天比地七宫福堂州天盛行世界其次第八清明仙天亦為一天比地八宫福集教天長安世界其次第九無愛仙天亦為一天比地九宫宛黎城天棄賢世界九天重壘各有八方故有九九八十一好也上清太上開天龍蹻經卷之三
