front:
  text: 上清太上開天龍蹻經卷之四達九
  hash: sha256:cd3285732da1ecd2ee22b10b4b95fd071567cb738c701f2965d9756e53824de3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0163_HFL_004-001a, image: hfl/1037/1037-108.png}
body:
  text: 應身三清三十六相元置品第八甯君告黄帝曰吾昔承天尊於大羅天爲諸大聖而演太上開天元置品經身生應身七十二相上生三境三十六天下生三界三十六帝三十六部三洞法門九品化生萬象宗本生天元始是稱天尊无上法王號爲玉帝三十六部境界玄梯三十六天三洞昇品玄元始氣三合成身九色寳光徧兹法體始生混氣混爲蒼光不假日月自然明朗蒼示通生鬱秀增長布徧色象名爲鬱單廣備開生應无量體證果立位上登玉清功德无量始登聖果故立鬱單无量天九天丈人萬善之長故顯第一上聖證品而立无形清微天次顯第二高聖證品而立元精波羅摩辱天次顯第三大聖證品而立无色无量德羅天復次第二混生於洞洞爲赤光不假日月自然明朗示定善行體能修定善壽命无量故號上上禪善天九天真王備中聖道福報无量而立此天神通變化故顯第四神聖證品故立玄微上虚禹餘天次顯第五玄聖證品而立玄清那首約淨天次顯第六真聖證品而立梵行稽那邊淨天復次第三洞生於浩浩爲青光不假日月自然明朗示以高舉須修延年顯以三氣開度幽明故號梵監須延天元始天王通真證聖故顯第七仙聖證品而立玄梵羅迦淨明天次顯第八靈聖證品而立元上上靈赤天次顯第九至聖證品而立大梵行如天復次第四元生於昊昊爲緑光不假日月自然明朗示以端寂無聲廣容通度德業通容昇進道境故號寂然兜術天元始天王立真實智故顯第一上真證品而立寳光玄妙天次顯第二高真證品而立飛梵福德天次顯第三太真證品而立虚梵際淳天復次第五昊生於景景爲黄光不假日月自然明朗示以行人不驕而樂慶宻是彼故名不驕樂天高上元皇教中真道故顯第四神真證品而立大梵近際天次顯第五玄真證品而立行梵快利天次顯第六仙真證品而立虚无結愛天復次第六景生於遯遯爲白光不假日月自然明朗示以真道應聲相通懃修真戒令不惑亂或畏魔王應聲化形隨心所慾而亂行人應此身相深戒所慾故顯此天令不退墮故號洞元化應聲天其天帝主虚皇玉帝應宣正行故顯第七天真證品而立大梵道德天次顯第八靈真證品而立梵行須達天次顯第九至真證品而立極梵阿那天復次第七玄生於融融爲紫光不假日月自然明朗示以靈化統任無崖無極三界緫統天關皆爲中升上爲七元普爲人首洞通七户故號靈化梵輔天萬始先生通生妙混應爲仙主而統生門故顯第一上仙證品而立徹梵道德天次顯第二高仙證品而立虛梵識慧天次顯第三天仙證品而立空梵伊檀天復次第八融生於炎炎爲碧光不假日月自然明朗示以重霄虚玄高遠清明洞耀瑩鑒形軀降氣三元生人三宫内爲五臟九府華蓋上應金華應天華府故名高虚清明天帝真華府命元也紫虚帝君通灌生體此天中人業行高遠上生重霄超出三界上進仙品昇解脫門故顯第四神仙證品而立緣梵慧入天次顯第五玄仙證品而立玄梵念慧天次顯第六真仙證品而立雲梵阿檀天復次第九炎生於演演爲烏光不假日月自然光明示以無想无慾能離胞胎之結無復存形之愛而得無想之心無結之業極果之人上證此天故言无想无結无愛天其天帝主太真玉皇爲說五慾念想假空故顯第七天仙證品而立洞微含那天次顯第八靈仙證品而立玄上滅然天次顯第九至仙證品而立極色若那天九一應體以示應身三洞通形而演三十六部應生三境三十六天從无生有漸寄語言不住於有性无所礙是名應身三十六相也天尊應降爲三界三十六相元置品第九甯君吿黄帝曰昔徃龍漢元始開圖无形无名天尊於大羅天上生三清三十六天下生三界三十六帝身放五色應化身光爲諸天帝而說太上開天元置品經先立四梵北真上天以爲東華西靈南極四天重壘四緒合成各生八景四八通運故爲四八三十二天内含四梵三十六相應生十號託跡諸天一號自然是物根本二號無極莫知所窮三號大道普包滋育四號至真真是至純五號太上極大窮高六號老君歷代應接七號高皇光明極上八號天尊天中宗尊九號玉帝玉美尊主十號陛下諸天上帝高上莫過天中之尊位稱陛下更无過上七十二相上下洞明八十一好傍照无極上无四帝下備四方四梵通生而立四緒四天各八三十二門合中四九三十六品故上三清九天妙氣降生三界九炁應生從上第一鬱單无量第一上天姓生於混混爲蒼色上結四梵太清等天次生四人而生二萬二千氣而成太極平育賈奕天此天中人壽一兆九千三百二十七萬三千五百二十八億三千二百萬歲上進階品其次第二上上禪善天從此天中氣漸流降混生於洞洞爲赤光上生三萬三千氣而成龍變梵度天此天中人壽九千六百六十三萬六千七百六十四億一千六百萬歲上進階品其次第三梵監須延天從此天中氣漸流降洞生於浩浩爲青色而生四萬四千氣而成太釋玉隆騰勝天此天中人壽四千八百三十一萬八千三百八十二億八百萬歲上進階品其次第四寂然兜術天從此天中氣漸流降浩生於昊昊爲緑色上生五萬五千氣而成太虛无上常融天此天中人壽二千四百一十五萬九千一百九十一億四百萬歲上進階品此上四人喜樂悉靜其次第五波羅尼宻不驕樂天從此天中氣漸流降昊生於景景爲黄色上生六萬六千氣而成太素秀樂禁上天此天中人壽一千二百七萬九千五百九十五億五千三百萬歲此天中人氣觀轉妙增修四等稍除餘習上生四民天也其次第六洞元化應聲天從此天中氣漸流降景生於遯遯爲白色上生七萬七千氣而成太文翰寵妙成天此天中人壽六百三萬九千七百九十七億七千六百萬歲於此天中又恐都失便觀此識若有若無觀即生太素秀樂禁上天其次第七靈化梵輔天從此天中氣漸流降遯生於融融爲紫色上生八萬八千氣而成淵通元洞天此天中人壽三百一萬九千八百九十八億八千八百萬歲於此天中又患心識勞動便作捨識意修得生太文翰寵妙成天其次第八高虛清明天從此天中氣漸流降融生於炎炎爲碧色上生九萬九千氣而成皓庭霄度天此天中人壽一百五十萬九千九百四十九億四千四百萬歲其天中人六色惣淨麄淨都无如虛空也相既已盡色形又无便存心識以入氣觀得生淵通元洞天此是无色麄色都无爲對下界由有六輕塵色聲香味更无觸體故感四天三界上報其次第九無結無愛天從此天中氣漸流降炎生於演演爲烏色上生二百萬氣而成無極曇誓天此天中人壽七十五萬四千九百七十四億七千二百萬歲其天中人五色塵細淨由有一輕色塵其次第十從上第一鬱單無量天中氣漸流降演生於混混爲蒼色上生三百萬氣而成上揲阮樂天此天中人壽三十七萬七千四百八十七億三千六百萬歲其天中人四色塵細淨由有二輕色塵其次第十一從上第二上上禪善天中氣漸流降混生於洞洞爲赤色上生四百萬氣而成無思江由天此天中人壽一十萬八千七百四十三億六千八百萬歲其天中人三色塵細淨由有三輕色塵第十二從上第三梵監須延天中氣漸流降洞生於浩浩爲青色上生五百萬氣而成太黄翁重浮容天此天中人壽九萬四千三百七十一億八千四百萬歲其天中人二色塵細淨由有四輕色塵第十三從上第四寂然兜術天中氣漸流降浩生於昊昊爲緑色上生六百萬氣而成始皇孝芒天此天中人壽四萬七千一百八十五億九千二百萬歲其天中人一色塵細淨由有五輕色塵第十四從上第五波羅尼蜜不驕樂天中氣漸流降昊生於景景爲黃色上生七百萬氣而成顯定極風天此天中人壽二萬三千五百九十二億九千六百萬歲其天中人六色細淨由有六輕塵第十五從上第六洞元化應聲天中氣漸流降景生於遯遯爲白色上生八百萬氣而成太安黄崖天此天中人壽一萬一千七百九十六億四千八百萬歲其天中人一色塵麄淨五色塵細淨第十六從上第七靈化梵輔天中氣漸流降遯生於融融爲紫光上生九百萬氣而成元載孔昇天此天中人壽五千八百九十八億二千四百萬歲其天中人二色塵麄淨四色塵細淨第十七從上第八高虚清明天中氣漸流降融生於炎炎爲碧色上生二千萬氣而成太煥極瑤天此天中人壽二千九百四十九億一千二百萬歲其天中人三色塵麄淨三色塵細淨第十八從上第九无想无結无愛天中氣漸流降炎生於演演爲爲色上生三千萬氣而成玄明恭慶天此天中人壽一千四百七十四億五千六百萬歲其天中人四色塵麄淨二色塵細淨第十九從上第一鬱單無量天中氣漸流降演生於混混爲蒼色上生四千萬氣而成觀明端淨天此天中人壽七百三十七億二千八百萬歲其天中人五色塵麄淨一色塵細淨第二十從上第二上上禪善天中氣漸流降混生於洞洞爲赤色上生五千萬氣而成虚明堂耀天此天中人壽三百六十八億六千四百萬歲其天中人六色塵麄淨由有細色塵第二十一從上第三梵監須延天中氣漸流降洞生於浩浩爲青色上生六千萬氣而成竺落黄笳天此天中人壽一百八十四億三千二百萬歲其天中人一色塵麄染五色塵細淨第二十二從上第四寂然兜術天中氣漸流降浩生於昊昊爲緑色上生七千萬炁而成耀明宗飄天此天中人壽九十二億一千六百萬歲其天中人二色塵麄染四色塵細淨第二十三從上第五波羅尼宻不驕樂天中氣漸流降昊生於景景爲黃色上生八千萬氣而成玄明恭華天此天中人壽四十六億八百萬歲其天中人三色塵麄染三色塵細淨第二十四從上第六洞元化應聲天中氣漸流降景生於遯遯爲白色上生九千萬氣而成赤明和陽天此天中人壽二十三億四百萬歲其天中人四色塵麄染二色塵細淨第二十五從上第七靈化梵輔天中氣漸流降遯生於融融爲紫色上生二億萬氣而成太極蒙翳天此天中人壽一十一億五千二百萬歲其天中人五色塵麄染一色塵細淨第二十六從上第八高虚清明天中氣漸流降融生於炎炎爲碧色上生三億萬氣而生虚無越行天此天中人壽五億七千六百萬歳其天中人六色塵俱染初出慾界由有輕慾塵第二十七從上第九無想無結無愛天中氣漸流降炎生於演演爲爲色上生四億萬氣而成上明七耀摩夷天此天中人壽二億八千八百萬歲其天中人五慾根麄淨一慾根麄染第二十八從上第一鬱單無量天中氣漸流降演生於混混爲蒼色上生五億萬氣而成元明文舉天此天中人壽一億四千四百萬歳其天中人四慾根麄淨二慾根麄染第二十九從上第二上上禪善天中氣漸流降混生於洞洞爲赤色上生六億萬氣而成玄胎平育天此天中人壽七千二百萬歳其天中人三慾根麄淨三慾根麄染第三十從上第三梵監須延天中氣漸流降洞生於浩浩爲青色上生七億萬氣而成清明何童天此天中人壽三千六百萬歳其天中人二慾根麄淨四慾根麄染第三十一從上第四寂然兜術天中氣漸流降浩生於昊昊爲緑色上生八億萬氣而成太明玉完天此天中人壽一千八百萬歲其天中人一慾根麄淨五慾根麄染第三十二從上第五波羅尼宻不驕樂天中氣漸流降昊生於景景爲黄色上生九億萬氣而成太皇黄普天此天中人壽九百萬歳其天中人六慾根俱染是名慾界故此顯明天尊降生三界下顯三十六天天人之相也九京九山通生天人八十一好元置品第十甯君吿黃帝曰吾昔承天尊於大羅天而演太上開天元置品經應身生好普垂色象故顯法體應物成科下降生津境界通貫三清聖境玉京之山山有十重而有十名一曰蓋天首山二曰彌玄上山三曰羅玄洞虚山四曰高上真元山五曰衆寳幽劫刃山六曰无色大覺山七曰周觀洞玄山八曰景華太真山九曰不思議山十曰太玄都玉京太山山最上一重三清天蓋緫統彌羅上爲玄臺在下九重應爲九天各生八方九氣天關混爲九九八十一宫内顯天尊應爲身好通生大有而植形神境界天人同禀法象山高岫遠欲陟難昇七寳光明示無隔礙三十六帝九色流輝玉京天蓋顯登頂相此山應化通生天人降生三界上爲四梵下生應化三十二天復爲三界每一天心皆爲玄臺崑崙上宫亦名玉京玄都之山金城九重下統九氣玉樓十二八景持區各揔一天四氣生育中爲天柱上通天關緫氣上元三十五分合爲璇璣六百生主亦生人首頭象崑崙緫統三宫九户成體三元八景各備生神五運七元一身華蓋下腎溺水而遶靈關神龜呼吸奮爲雲雨皆禀玉京崑崙生好也上清太上開天龍蹻經卷之四
