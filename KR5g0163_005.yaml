front:
  text: 上清太上開天龍蹻經卷之五達十
  hash: sha256:7919155abf1805f23f49a4c07415f10a4cf03127532c38d7f8f19df8676ddae5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0163_HFL_005-001a, image: hfl/1037/1037-134.png}
body:
  text: 元始化身而立三清三十六相元置品第十一寧君告黃帝曰吾昔承天尊於大羅天為諸天帝而演太上開天元置品經託身立相境界垂形玄元始氣九聖通體七十二相遍備天人九色身光洞朗明徹上部九變三境通形中部九孔九一通化下部九名九土通神三十六相三宫通顯頭象大羅圓通無礙腦有九宫九天應身心有九孔九聖洞明下部九名應垂生體腦九宫者第一太皇宫太上君后居之第二玉帝宫玉清神君居之第三天庭宫上清神君居之第四極真宫太極神君后居之第五丹宫真君居之第六流珠宫神仙居之第七丹田宫上元赤子真人帝君之卿天帝君居之第八洞房宫左有無英公子右有白元君中為黃老三魂居之第九明堂宫左有明童真官右有明女真官中有明鏡真官居之太一真人是腦之精生人三元九宫生神也中一絳宫心有九孔通於九真中元真人居其中宫丹皇君輔皇卿共治絳宫而守絳宫九真之道與物混通應為至人變現無方應為聖人真淳妙化應為真人普度遷升應為仙人神通無礙應為神人達有通無應為靈人妙辨通微應為賢人抱道懷德應為道人功行兼濟應為行人心有九孔應生九人九種通方備中一相也下元嬰兒守元陽宫位為黃庭元王右有保弼卿而守下一黃庭宫桃康命君精通玄象紫霞三市黃雲四纏胞胎命門生神之主上通九天下通九地內生一身而為九神上有九人三三為位左有韓衆右有范蠡中有大成子左腎為司徒公右腎為司空公中有太一君左有青腰玉女右有白素玉女中有玄光玉女玄光玉女者道之元氣生成之母降氣下一胞胎之府三清妙化九氣降神生人三宫二十七位內合九神三十六相也元始化身而生三界三十六相元置品第十二寧君告黃帝曰吾昔承天尊於大羅天而演太上開天元置品經託身立相應體生天開化人神普垂色象上為三清無形化主三十六天尊降生三界應化立形三十六天帝二景通運五合生成各為天關天皇大帝東極中辰中央星也吾為上首作生人父也從道父母寄備因緣託化隂陽而成有體青陽元氣為太陽精東王父也太和之氣以為隂精西王母也上結四梵三界頂天下治崑崙上通九氣金城九重玉樓十二總統二景四運上生人目日月通光下生兩乳為日月會日夜升降否泰互差天人同道幽顯見異三清三尊帝一太一帝君等神通生天人皆稟氣象無量妙一結為紫户天中王氣上為腦精頭圓法天頂為玄蓋百神靈宗身生窟宅津液山源一身命主頭為高臺象天崑崙髮是明堂晨辰臨精腦有九宫三清通貫面為尺宅真人之宫上關七户七元相通身為玉樹足為地關口為心關手為天關眉是白元為人華蓋上為交止而合三元帝君生氣以養神童左右真人通光徹視自是太一通神日月左為王父陽景滋軀右為王母隂光定體鼻為天門通天玉液金匱之鄉神之門户上挾日月歸於中斗營室之中璇璣玉衡口是絳宫心之朱淵舌為靈根五音金鑰無英公子長生龍轅齒為茂胎胄宫威刀耳是帝君通響聰門喉為玄關職池之精受符復下傳付太倉腸為氣城腹為氣邑腎為玄谷上應南斗大腸三十六盤命稟三十六天小腸各有二丈四尺普感八景二十四帝下元玄氣為大鴻臚中元元氣為八十一元士上元始氣為高車使者通神上皇九天玉帝也膽為天子大道君脾為皇后貴女心為太尉公左腎為司徒公右腎為司空公肝為青陽東宫主鍊三魂蘭臺府肺為玉堂西宫主鍊七魄尚書府心為絳宫朱雀關門元陽府腎為北極幽關玄武內門幽昌宫太和府脾為明堂宫侍中內侍省門太素府內為太倉天子之厨吾之舍也膽為紫微宫無極府胃為上海日月所宿臍為下海日月更處中有神象呼吸流氣作為風雨通行四支無不周至臍傍五城五藏神也十二朱樓十二子也外有八神八景匡識內生人身應天八節三焦神六人左社右稷風伯雨師雷公霹靂以為震動而起識神上下隂陽日月通宿崑崙弱水晃晃玄玄冥冥之淵日月之行故天晝日日下照於地萬物皆得其明人亦法之晝日日下照於臍下故萬物皆得其明夜日在胃中上照胸中萬神遊戲相與語言人識交故所以有夢也故上三洞玄元始氣三合生神上元始氣生人上一華蓋之下泥丸上宫上元赤子上通天氣位為腦精泥丸天帝右有帝卿守人上宫三魂七魄五日一來而朝受事也中一絳宫元氣所生中元真人生人中宫右有輔皇卿共治中宫主四支五藏筋骨五內三魂七魄三日一來而朝受事也下一黃庭宫玄氣所生下元嬰兒守元陽宫位為黃庭元王右有保鎮弼卿共守命門津液之神三魂七魄一日三來而朝受事也三洞流布九氣結形三十六天同為滋身相髮為青城君頭為三合君兩眉為八極君兩目為玄爽君左耳為聰明君右耳為決明君鼻為天户君口為牙門君脣為玉户君齒為二十八極元仕君舌為元極君咽為校尉君喉為九卿君肝為絳宫君肺為玄爽君膽為長命君心為丹田君脈為紫帛君胃為太倉君脾為黃庭君左腎為玄妙君右腎為元正君大腸為太倉君小腸為導引君腹為大道君三焦為玄老君左腳為小車君右腳為徘徊君左足為雷電君右足為雲氣君天尊言三十六生氣君者應起吾身通生相體普植天人同滋識用也天尊言若人厄疾恐怖不安誦念生神聖降神就生道增益命盡更延若識生源冥通上境天人相貫上感玄根八景鑒明九天通識身神響應影赴隨形密意生愆禍從外尅罪福報應毫分無差境界法門念隨心立欲尋玄路舉趣日前志靜神清道通無礙也元始化身通生境界而植人神八十一好元置品第十三寧君告黃帝曰吾昔承天尊於大羅天而演太上開天元置品經元始應體萬象法門三洞九帝生身法宅三境三界三寶接生九天九人三乘通感應兹法體普備十方託氣化形皆稟好象故應化身妙一成立在天天一在人人一在地地一同感妙一兩半生神三元肇分八景成别上一散為二十四真中一散為二十四神下一散為二十四賢三元八景七十二神依變七十二方經三天各二十四帝內含九宫八十有一故應九九而生其好上元八景洞真部中元八景洞玄部下元八景洞神部三部八景二十四神正是二十四氣氣亦成神神亦成氣散之為雲霧合之為形影出之為造化入之為真一上結三元下結萬物神真變化無有定名百神中皆以三洞三合成德天地之極上境二十四帝者正是下方二十四氣是也二十四帝帝各三元合七十二元元各五神而生三界三百六十神合為六十四梵氣混氣三十二天帝故生一天三百六十神一人三百六十骨上為三宫生人二十七天關中為三宫生人二十七神機下為三宫生人二十七靈節混通三元八十有一因兹法象而植形神通道生津始成靈識故應生人八十一好也寧君告黃帝曰吾昔承元始天尊而演三洞身光相好應化通生七十二相本迹雙顯上生三境福力莊嚴無量功德三十六相下生三界應報見生善惡命根隨緣感宅故應三界三十六相境界通應以示人天三身各顯七十二相內明三洞而植其神外顯通生始應天體於此天象通象生人普植黎元皆稟三洞三十六門而生神識三十六相三洞通玄七十二相境界相貫八十一好九九化生三身應相三度通應皆從九一而生九天九色寶光通為九户遍兹境界廣備太空並感道源而成識用外通玄象俱是化身內靜虛通是吾正性也是時黃帝拜受寧君請問大道通生於人寧君為演上宣玉帝生天化體應相成人三洞化形九天合德天人通貫法象齊臨妙一同滋五德咸備開天要訣釋滯除疑曉洞玄津邇趣遐感又白請問啓寧君曰三洞聖路元始通生天通於人人通於道德道修真玄關何在寧君答曰神符告命萬帝俱朝佩服蹻符三洞通啓九地保舉八景營形聖境真鄉潛升往至汝可諦聽受吾蹻符升虛入無皆從此起經是徑路趣道來由符是玄樞入道法户也黃帝拜謝又白啓曰生天相好感象成軀神淨身明入道方急志求仙路願示寶文幸及神顔賜垂聖目請乞受持奉修祕旨寧君告黃帝曰元始應相境界垂形天人相通報力隨感九天應化尚自不同九品上人骨相皆别輕重有異報應無差夙有玄名始有仙相汝先代有慧慶及今生升入仙階奉吾此籙大道無象應相立形應相生天始名相體凡學仙道未可即成皆藉先緣仙相後感言龍蹻符者雲綱嬌舉升虛入無乘氣御龍上至玉帝元始告命太上為宣方始至於遺吾傳授也吾今宣道為汝宣經應感見吾即吾非有道通無外授汝寶章仙籍通天天亦通汝應合得道名舉將來始受汝符告命之信也神符神籙元天命門神印神經三天告始志念吞服六符圓明佩帶靈圖七元通啓九天命召九地奏名神升於天經道雙顯符經異目受説不同次授蹻符别為一録可傳後代有道聖君密而修之非賢不度也上清太上開天龍蹻經
