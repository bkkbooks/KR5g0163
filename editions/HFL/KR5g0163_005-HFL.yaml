front:
  text: 上清太上開天龍蹻經卷之五達十
  hash: sha256:7919155abf1805f23f49a4c07415f10a4cf03127532c38d7f8f19df8676ddae5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0163_HFL_005-001a, image: hfl/1037/1037-134.png}
body:
  text: 元始化身而立三清三十六相元置品第十一甯君告黄帝曰吾昔承天尊於大羅天爲諸天帝而演太上開天元置品經託身立相境界垂形玄元始氣九聖通體七十二相遍備天人九色身光洞朗明徹上部九變三境通形中部九孔九一通化下部九名九土通神三十六相三宫通顯頭象大羅圓通無礙腦有九宫九天應身心有九孔九聖洞明下部九名應垂生體腦九宫者第一太皇宫太上君后居之第二玉帝宫玉清神君居之第三天庭宫上清神君居之第四極眞宫太極神君后居之第五丹宫真君居之第六流珠宫神仙居之第七丹田宫上元赤子眞人帝君之卿天帝君居之第八洞房宫左有无英公子右有白元君中爲黄老三魂居之第九明堂宫左有明童真官右有明女真官中有明鏡真官居之太一真人是腦之精生人三元九宫生神也中一絳宫心有九孔通於九真中元真人居其中宫丹皇君輔皇卿共治絳宫而守絳宫九眞之道與物混通應爲至人變現无方應爲聖人真淳妙化應爲眞人普度遷昇應爲仙人神通无礙應爲神人達有通无應爲靈人妙辯通微應爲賢人抱道懷德應爲道人功行兼濟應爲行人心有九孔應生九人九種通方備中一相也下元嬰兒守元陽宫位爲黄庭元王右有保弼卿而守下一黄庭宫桃康命君精通玄象紫霞三市黄雲四纏胞胎命門生神之主上通九天下通九地内生一身而爲九神上有九人三三爲位左有韓衆右有范蠡中有大成子左腎爲司徒公右腎爲司空公中有太一君左有青腰玉女右有白素玉女中有玄光玉女玄光玉女者道之元氣生成之母降氣下一胞胎之府三清妙化九氣降神生人三宫二十七位内合九神三十六相也元始化身而生三界三十六相元置品第十二甯君吿黄帝曰吾昔承天尊於大羅天而演太上開天元置品經託身立相應體生天開化人神普垂色象上爲三清無形化主三十六天尊降生三界應化立形三十六天帝二景通運五合生成各爲天關天皇大帝東極中辰中央星也吾爲上首作生人父也從道父母寄備因緣託化隂陽而成有體青陽元氣爲太陽精東王父也太和之氣以爲隂精西王母也上結四梵三界頂天下治崑崙上通九氣金城九重玉樓十二緫統二景四運上生人目日月通光下生兩乳爲日月㑹日夜昇降否泰互差天人同道幽顯見異三清三尊帝一太一帝君等神通生天人皆禀氣象无量妙一結爲紫户天中王氣上爲腦精頭圓法天頂爲玄蓋百神靈宗身生窟宅津液山源一身命主頭爲高臺象天崑崙髮是明堂晨辰臨精腦有九宫三清通貫面爲尺宅真人之宫上關七户七元相通身爲玉樹足爲地關口爲心關手爲天關眉是白元爲人華蓋上爲交止而合三元帝君生氣以養神童左右真人通光徹視自是太一通神日月左爲王父陽景滋軀右爲王母隂光定體鼻爲天門通天玉液金匱之郷神之門户上挾日月歸於中斗營室之中璇璣玉衡口是絳宫心之朱淵舌爲靈根五音金鑰無英公子長生龍轅齒爲茂胎冑宫威刀耳是帝君通響聦門喉爲玄關職池之精受符復下傳付太倉腸爲氣城腹爲氣邑腎爲玄谷上應南斗大腸三十六盤命禀三十六天小腸各有二丈四尺普感八景二十四帝下元玄氣爲大鴻臚中元元氣爲八十一元士上元始氣爲高車使者通神上皇九天玉帝也膽爲天子大道君脾爲皇后貴女心爲太尉公左腎爲司徒公右腎爲司空公肝爲青陽東宫主鍊三魂蘭臺府肺爲玉堂西宫主鍊七魄尚書府心爲絳宫朱雀關門元陽府腎爲北極幽關玄武内門幽昌宫太和府脾爲明堂宫侍中内侍省門太素府内爲太倉天子之厨吾之舍也膽爲紫微宫无極府胃爲上海日月所宿臍爲下海日月更處中有神象呼吸流氣作爲風雨通行四支无不周至臍傍五城五藏神也十二朱樓十二子也外有八神八景匡識内生人身應天八節三焦神六人左社右稷風伯雨師雷公霹靂以爲震動而起識神上下隂陽日月通宿崑崙弱水晃晃玄玄㝠㝠之淵日月之行故天晝日日下照於地萬物皆得其明人亦法之晝日日下照於臍下故萬物皆得其明夜日在胃中上照胷中萬神遊戲相與語言人識交故所以有夢也故上三洞玄元始氣三合生神上元始氣生人上一華蓋之下泥丸上宫上元赤子上通天氣位爲腦精泥丸天帝右有帝卿守人上宫三魂七魄五日一來而朝受事也中一絳宫元氣所生中元真人生人中宫右有輔皇卿共治中宫主四支五藏筋骨五内三魂七魄三日一來而朝受事也下一黄庭宫玄氣所生下元嬰兒守元陽宫位爲黄庭元王右有保鎭弼卿共守命門津液之神三魂七魄一日三來而朝受事也三洞流布九氣結形三十六天同爲滋身相髪爲青城君頭爲三合君兩眉爲八極君兩目爲玄爽君左耳爲聦明君右耳爲决明君鼻爲天户君口爲牙門君脣爲玉户君齒爲二十八極元仕君舌爲元極君咽爲校尉君喉爲九卿君肝爲絳宫君肺爲玄爽君膽爲長命君心爲丹田君脉爲紫帛君胃爲太倉君脾爲黄庭君左腎爲玄妙君右腎爲元正君大腸爲太倉君小腸爲導引君腹爲大道君三焦爲玄老君左脚爲小車君右脚爲徘徊君左足爲雷電君右足爲雲氣君天尊言三十六生氣君者應起吾身通生相體普植天人同滋識用也天尊言若人戹疾恐怖不安誦念生神聖降神就生道增益命盡更延若識生源㝠通上境天人相貫上感玄根八景鑒明九天通識身神響應影赴隨形宻意生愆禍從外尅罪福報應毫分无差境界法門念隨心立欲尋玄路舉趣日前志靜神清道通无礙也元始化身通生境界而植人神八十一好元置品第十三甯君吿黄帝曰吾昔承天尊於大羅天而演太上開天元置品經元始應體萬象法門三洞九帝生身法宅三境三界三寳接生九天九人三乘通感應兹法體普備十方託氣化形皆稟好象故應化身妙一成立在天天一在人人一在地地一同感妙一兩半生神三元肇分八景成别上一散爲二十四眞中一散爲二十四神下一散爲二十四賢三元八景七十二神依變七十二方經三天各二十四帝内含九宫八十有一故應九九而生其好上元八景洞眞部中元八景洞玄部下元八景洞神部三部八景二十四神正是二十四氣氣亦成神神亦成氣散之爲雲霧合之爲形影出之爲造化入之爲真一上結三元下結萬物神眞變化无有定名百神中皆以三洞三合成德天地之極上境二十四帝者正是下方二十四氣是也二十四帝帝各三元合七十二元元各五神而生三界三百六十神合爲六十四梵氣混氣三十二天帝故生一天三百六十神一人三百六十骨上爲三宫生人二十七天關中爲三宫生人二十七神機下爲三宫生人二十七靈節混通三元八十有一因兹法象而植形神通道生津始成靈識故應生人八十一好也甯君告黄帝曰吾昔承元始天尊而演三洞身光相好應化通生七十二相本跡雙顯上生三境福力莊嚴无量功德三十六相下生三界應報見生善惡命根隨縁感宅故應三界三十六相境界通應以示人天三身各顯七十二相内明三洞而植其神外顯通生始應天體於此天象通象生人普植黎元皆禀三洞三十六門而生神識三十六相三洞通玄七十二相境界相貫八十一好九九化生三身應相三度通應皆從九一而生九天九色寳光通爲九户遍兹境界廣備太空並感道源而成識用外通玄象俱是化身内靜虚通是吾正性也是時黄帝拜受甯君請問大道通生於人甯君爲演上宣玉帝生天化體應相成人三洞化形九天合德天人通貫法象齊臨妙一同滋五德咸備開天要訣釋滯除疑曉洞玄津邇趣遐感又白請問啓甯君曰三洞聖路元始通生天通於人人通於道德道修真玄關何在甯君答曰神符告命萬帝俱朝佩服蹻符三洞通啓九地保舉八景營形聖境真郷潜昇徃至汝可諦聽受吾蹻符昇虚入无皆從此起經是逕路趣道來由符是玄樞入道法户也黄帝拜謝又白啓曰生天相好感象成軀神淨身明入道方急志求仙路願示寳文幸及神顔賜垂聖目請乞受持奉修祕㫖甯君告黃帝曰元始應相境界垂形天人相通報力隨感九天應化尚自不同九品上人骨相皆别輕重有異報應无差夙有玄名始有仙相汝先代有慧慶及今生昇入仙階奉吾此籙大道無象應相立形應相生天始名相體凡學仙道未可即成皆藉先緣仙相後感言龍蹻符者雲綱嬌舉昇虚入无乘氣御龍上至玉帝元始告命太上爲宣方始至於遺吾傳授也吾今宣道爲汝宣經應感見吾即吾非有道通无外授汝寳章仙籍通天天亦通汝應合得道名舉將來始受汝符告命之信也神符神籙元天命門神印神經三天告始志念吞服六符圓明佩帶靈圖七元通啓九天命召九地奏名神昇於天經道雙顯符經異目受說不同次授蹻符别爲一録可傳後代有道聖君宻而修之非賢不度也上清太上開天龍蹻經
