front:
  text: 上清太上開天龍蹻經卷之二達七
  hash: sha256:ad04731df2e8a1f719d17e62098040e23408c1f882a9877fcb027e409900e0c1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0163_SJB_002-330734b, image: sjb/33/330734b.png}
body:
  text: 三洞通生元置品第二是時黃帝拜參甯君請問三洞尊經三品傳道啓問說已又拜稽首復請訣曰三洞尊經上生三境三十六天三十六部既生境界各有三十六天三十六天亦是三十六部以不甯君答曰玄元始氣三境玄根三十六部生天法宅三洞降德爲天人之生主九聖通化爲象帝之玄根三十六部爲境界之生門三十六天爲入道之階品故因經以開導明氣象以通於經開逕路以證道郷藉證修而登聖果淨身神以通道境修盟約以祛惑情三十六部洞觀齊臨三十六天隨心嚮應三清上境下界應緣三界昇墜劬在心首階品不等故立界名隨根應感凡有五種諦聽吾言方爲汝說甯君吿黃帝曰吾昔承道主生化法王天中之尊皆悉禀受初降妙一聖化初始始生於元元通眞道元生於玄玄主仙教仙眞聖位三洞玄尊三寳立位三號亦别故於龍漢初時元始開圖應爲玉清天寳聖君號爲大洞无形天尊而說大洞十二部經而教玉清十二聖天次於赤明劫時應爲上清靈寳眞君號爲洞玄无名天尊而說洞玄十二部經而教上清十二眞天次於上皇劫時應爲泰清神寳仙君號曰洞神元始天尊而說洞神十二部經而教泰清十二仙天三十六部經生於諸天天人禀受故名三界三乘漸頓接引通方開度有賢應身降受歷代教化天尊通神三洞寳經隨方顯用甯君吿黄帝曰元始應身七十二相上生三境下生三界皆禀三洞品物流形生天元始故稱天尊三十六部天尊化體三界之内三寳接生應感不同故爲无色色慾界也又爲衆生根性參差雖同一天咸有五種一者三洞三界二者應化三界三者反出三界四者流來三界五者輪迴三界言三洞三界者三十六部上生三境三十六天中生三界三十六帝下生九壘三十六土皇天人相通三乘接引精氣相貫皆禀三洞善貸得生也其二應化三界者三部八景應爲隂陽四時變化見有生老其三反出三界者至道妙氣灌養生神雖居躭著不爲所染起羣絶俗離有爲門反此囂塵獨超上道也其四流來三界者從道妙本寄備隂陽形染六情見起通執善善相繼惡惡相續流轉見報入善惡門也其五輪迴三界者躭染見著而墜三塗流輪惡道不能得出永沈苦海長淪愛慾也甯君吿黄帝曰元始應演三洞尊經通成境界接引階品无有爲有開化天人令登无相以入空解上顯三境三洞通方下生三界應感三種一者豁爾虛空二者質礙形色三者緣慮心體言一者豁爾虛空者空洞道氣混化太虚應象立无而成境界山河石壁嶮岨幽深端正好醜以爲躭滯天人六道感有見无故云一者豁爾虚空也言質礙形色者應化三界三十二天生處隂陽而成有體從道妙一善貸生津寄託胞胎世間父母兩半相合而執有形具足諸根是爲色聚既根成就生六種識而起分别是爲識聚既妄聚塵分别假相而生戀著是爲想聚倒想聚已妄生憎愛而起貪嗔是爲行聚既覩聚合妄想堅成執見愚癡而生惡行淪没三塗不能得出是故名爲質礙形色言緣慮心體者即體是報由業緣生善智慧者返道復源愚癡濁辱流浪惡道隨其所報應感見生六慾四心爲以界畔是故名爲緣慮心體也是故爲說三界感差受報各異而有五種一者未入三界繫縛之位雖生其域非三界因出於生滅上生四人天也二者感生无色業上出色慾猶四輕塵捨識增修妄形神淨也三者感生色界之業爲色深重漸捨六塵三度重捨十八天報四者感生慾界之業六慾躭染故感六天五者感生三惡道業爲躭六慾三毒見生而落畜生餓鬼地獄道也通生官屬元置品第三甯君吿黃帝曰元始天尊昔於大羅明霞觀中應生境界而演三洞三十六部大洞上品十二部經具有三洞三十六部尊經之福何以故大洞聖教通眞生仙兼包衆經一切官屬故有洞玄洞神三十六部上品功德洞玄部中不及兼上唯通於下而攝洞神故有二十四部眞仙之力洞神仙經不及於上唯有洞神十二部經生仙之福三洞應化通起生源三寳接引麄妙有别從道妙氣降跡生神无有爲有有元所有體解大道發无上心解脫无爲常樂我淨也洞玄眞教中乘應緣從聖降眞通玄入妙故說應化開方便門知有不有從有發修无愛染心離有爲境修習正觀安住中道洞神仙教寄備因縁故立境界諸天官屬開化人神成立諸法三寳通化仙爲生門從生發修入无相體故顯應化仙陽生首從生遷仙遷仙入眞遷眞入聖遷聖入道三洞妙有以氣爲宗宗生於始始生於元无生於玄始氣通聖上生玉清元氣主眞中生上清玄主仙教下生泰清三清應象三寳通臨三十六部應天教授三十六天三洞生根三界禀氣應界修品七十二相境界垂形八十一好表生大有故於龍漢劫時號爲无形天尊應爲玉清天寳聖君以爲大洞之尊玉帝而生九萬九千九百九十億萬氣一氣各生九萬九千九百九十億萬里一氣各生九萬九千九百九十億萬歳歲里數終曆分相合下通三界以爲大劫也次於赤明劫時號爲无名天尊應爲上清靈寳眞君爲洞玄之尊君而生九萬九千九百九十九萬氣一氣各生九萬九千九百九十里一氣各生九萬九千九百九十萬歲歲里數終曆分相合下通三界以爲中劫次於上皇劫時號爲元始天尊爲洞神之尊神而生九萬九千九九百九十萬氣一氣各生九萬九千九百九十萬里一氣各生九萬九千九百九十萬歲歲里數終曆分相合下通三界以爲小劫天尊言吾今應相境界通身上顯諸天下應萬象歷劫應化開度兆人有道上賢降爲師授或生下界與物混㝠託質通凡沈浮莫辨與道通化應接有縁爲受是經令開慧解潜行救度不恃有恩志淨神清爲宣是法甯君重告黄帝曰三清九帝八景通方應生三境通爲接引下降三界品物成形開心天人同禀官屬故玄元始氣各生八景而爲二十四帝九天各生八景而爲七十二官言二十四帝化爲二十四神二十四神化爲二十四氣氣亦成神神亦成氣散之爲雲霧合之爲形影出之爲造化入之爲眞一上結三元言結萬物神眞變化元有定名百神之中皆以三合成德天地之極上境二十四帝下爲三界二十四氣二十四帝帝各三元元各五神合生三百六十神混通三界三百六十神各生一天三百六十宫各生一歲三百六十日又生一月三百六十時各生人身三百六十骨普生一地三百六十名山下通天氣八景齊臨上灌生津合氣同植无極三界普禀此原天人相通萬境通貫八景開化應象立原二十四帝上生三百六十神六位而成合爲六十四梵氣六位相合三十有二三十二歲天一周也故明三界三十二天三清九氣上下通神傍貫璇璣四運明朗三洞天曆歲爲三元六位陽辰爲六齋月八景通運八節修門十直朝尊奉修十善燒香願念功感諸天然燈續明拔生救死香花寳蓋供養諸天轉讀尊經令通慧解上懺七祖先代宿殃下爲含靈同滋法澤三清衆聖俯鑒丹誠三界宫屬同垂監暎三宫清淨九户圓明五藏曉徹六府通慧八十一好光生八十一關機三十二相通明三百六十骨三十二帝表現玄虚三十六天顯登頂相八景備衛九天翼形駕景策龍上登玉清也甯君告黄帝曰大道生化无物不通大包无外細入无間无物不禀无物不生无物不度无物不成開廓太空分爲十等從上大羅下及三清而爲七分上及傍普皆備太空以爲道境故玄都玉京山上而有七覺之氣也大羅已下而生三境合爲七分傍備太空通爲聖境復次三清八方正中各於其下又爲一分而生比地五億億五萬億五千億五百億五十億五五億等无極三界皆感五氣五運生成故通天地五十五數三元上下皆以三洞合通九帝一十二天緫合三元三十六帝正中八方普稟三清唯感四序三十二天三百六十度以成二十八宿五運生化雖感道原分應通凡從上第八分也復次各於无極三界已下又爲一分以爲九壘三十六土皇皆禀三界上通三清每年八節四季之日録人善惡上奏三清善惡罪福上下計會此通從上第九分也復次九壘之下而有八門九幽地獄上是陽考下主隂罰上下各九亦名十八大地獄也於此獄下大風澤之炁似風非風似水非水識苦性昏不可分别擎持地輪全不傾倒此是從上第十分也甯君告黄帝曰三洞通化九氣混生天有三十六曹君地有三十六司府三境下降九氣通生九壘上騰三界通感一天境域二景合明三光齊臨四緒咸備璇璣混合緫統彌羅廣覆生神應氣成熟周天曆紀運度玄關九壘土神各爲比地太歲太隂大將軍歲德建破之神若有行人奉修三洞三清上經當勉下地九土靈祇不爲作害故第一之地名元德其氣上青中黄是元土卿所治厚一萬一千一百一十里土象百官悉治其中第二之地皇德其氣通黑是元庭土丞所治土家百官亦治其中第三之地帝德其氣通蒼是虎口土龍所治土家百官亦治其中第四之地王德其氣通黄是元心土大將軍所治第五之地人德其氣通赤是元福土令所治第六之地地德其氣通白是元骨土長所治第七之地里德其氣通紫是始甲六父母所治第八之地復德其氣通青是始賢土宗正所治第九之地昌德其氣通緑是軒始土下有二千石所治九地土官各管土府上通比地十二神官也上清太上開天龍蹻經卷之二
